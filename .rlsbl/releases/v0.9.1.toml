# Version bump type: patch, minor, major, hotfix, or prerelease
bump = "patch"
# Short description of this release (required)
description = "strictcli 0.29 compatibility — fixes `tinymoon check` crashing at startup"
# Optional context explaining why these changes were made
context = "strictcli 0.29.0 requires ctx-first handler signatures. Published tinymoon 0.9.0 crashed at import under current strictcli (handler missing parameter \"dir\"). This patch migrates all CLI handlers to the ctx-first signature, restoring compatibility."
# Pre-release identifier: alpha, beta, rc, or stable
# preid = ""
# Set to true to generate a blog post for this release
# blog = false
include = ["npm", "pypi", "go"]
exclude = []
